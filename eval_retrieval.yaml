# eval_retrieval.yaml — labeled queries for Kontext retrieval quality evaluation
#
# Run with: python -m eval_retrieval
# See: docs/mastermind-reports/2026-04-17-kontext-retrieval-awareness.md (Phase A3)
#
# Schema per entry:
#   query:          the natural-language question to feed kontext_query
#   expected_files: list of memory file names that SHOULD appear in top-k results
#   category:       domain-obvious | cross-domain | emotional | behavioral | cold
#   held_out:       true => reserved for final validation; never tune on these
#
# Composition: 8 domain-obvious, 8 cross-domain, 6 emotional, 6 behavioral, 2 cold
# Held-out: 8 of 30 (roughly proportional across categories)

# ============================================================
# DOMAIN-OBVIOUS (8) — one keyword should lock the right file
# ============================================================

- query: "What's my PFA tax regime?"
  expected_files: [user_financial_architecture.md]
  category: domain-obvious
  held_out: false

- query: "Explain the SAS Protocol phases"
  expected_files: [user_vocal_expertise.md]
  category: domain-obvious
  held_out: false

- query: "What is Medical Noir?"
  expected_files: [project_vocality_brand.md]
  category: domain-obvious
  held_out: true

- query: "When is the D212 deadline?"
  expected_files: [user_financial_architecture.md]
  category: domain-obvious
  held_out: false

- query: "POV Guy YouTube channel details"
  expected_files: [project_goals.md]
  category: domain-obvious
  held_out: false

- query: "Who is Rafael Vazquez?"
  expected_files: [user_vocal_expertise.md]
  category: domain-obvious
  held_out: true

- query: "Fidelis bonds strategy"
  expected_files: [user_financial_architecture.md]
  category: domain-obvious
  held_out: false

- query: "Preply to Stripe migration status"
  expected_files: [project_goals.md, user_financial_architecture.md]
  category: domain-obvious
  held_out: false

