{% extends "base.html" %}
{% block title %}Sign in · Kontext{% endblock %}
{% block bare %}
<div class="min-h-screen flex items-center justify-center">
  <form action="/dashboard/login" method="post" class="w-96 border hairline p-10 rounded">
    <div class="mono text-xs tracking-widest uppercase dim mb-8">Kontext</div>
    <label class="block text-xs uppercase tracking-widest dim mb-2">Workspace</label>
    <input name="workspace_id" required autocomplete="off"
           value="ws-ionut"
           class="w-full bg-transparent border hairline rounded px-3 py-2 mono text-sm mb-4 focus:outline-none focus:border-neutral-500" />
    <label class="block text-xs uppercase tracking-widest dim mb-2">Workspace token</label>
    <input name="workspace_token" required autocomplete="off" type="password"
           class="w-full bg-transparent border hairline rounded px-3 py-2 mono text-sm mb-6 focus:outline-none focus:border-neutral-500" />
    {% if error %}
      <div class="mb-4 text-xs text-red-400">invalid credentials</div>
    {% endif %}
    <button type="submit"
            class="w-full bg-neutral-100 text-neutral-900 rounded px-3 py-2 text-sm font-medium hover:bg-white">
      sign in
    </button>
  </form>
</div>
{% endblock %}
